<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-visual">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="hc">
  <meta name="theme-color" content="#0d0d0d">
  <link rel="manifest" href="./manifest.json">
  <title>hc — hack.chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #212834;
      --fg: #d4d4d4;
      --cy: #4ec9b0;
      --yl: #e5c07b;
      --mg: #c678dd;
      --rd: #e06c75;
      --bl: #61afef;
      --gr: #98c379;
      --dm: #a6a6a6;
      --hdr: #1a1f2b;
      --hy: #3a3000;
      --hyr: #3a0000;
      --hyg: #003a00;
      --hyb: #003040;
      --mn: #3a3000;
    }

    html, body {
      height: 100%; height: 100dvh;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Menlo', 'Monaco', 'Cascadia Code', 'Courier New', Courier, monospace;
      font-size: 10px;
      line-height: 1.6;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
      position: fixed;
      width: 100%;
      top: 0;
      left: 0;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%; height: 100dvh;
      position: fixed;
      width: 100%;
      top: 0;
      left: 0;
    }

    /* ── Header bar ── */
    #hdr {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
      padding-top: env(safe-area-inset-top, 0px);
      height: calc(32px + env(safe-area-inset-top, 0px));
      background: var(--hdr);
      border-bottom: 1px solid rgba(128,128,128,0.2);
      flex-shrink: 0;
      font-size: 11px;
      user-select: none;
      min-height: calc(32px + env(safe-area-inset-top, 0px));
    }
    #hdr.visible { display: flex; }
    #hdr-room { color: var(--cy); font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #hdr-enc { margin-left: auto; font-size: 10px; flex-shrink: 0; }
    #hdr-enc.on  { color: var(--gr); }
    #hdr-enc.off { color: var(--rd); }
    #hdr-users { color: var(--dm); font-size: 10px; flex-shrink: 0; }
    #hdr-reconn { color: var(--yl); font-size: 10px; flex-shrink: 0; display: none; }

    #out {
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: none;
      padding: calc(24px + env(safe-area-inset-top, 0px)) 14px 4px;
      white-space: pre-wrap;
      word-break: break-word;
      -webkit-overflow-scrolling: touch;
    }

    /* ── Update banner ── */
    #update-bar {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: calc(8px + env(safe-area-inset-top, 0px)) 14px 8px;
      background: var(--hyg);
      color: var(--gr);
      font-size: 11px;
      cursor: pointer;
      flex-shrink: 0;
      user-select: none;
    }
    #update-bar.visible { display: flex; }

    .ln { display: block; min-height: 1.6em; }

    #bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      padding-bottom: calc(7px + env(safe-area-inset-bottom, 0px));
      border-top: 1px solid rgba(128,128,128,0.2);
      flex-shrink: 0;
      background: var(--bg);
    }

    #pr { color: var(--cy); user-select: none; flex-shrink: 0; }

    #inp {
      width: 100%;
      background: none;
      border: none;
      outline: none;
      color: var(--fg);
      font-family: inherit;
      font-size: 16px;
      line-height: inherit;
      caret-color: var(--cy);
      min-width: 0;
      position: relative;
      z-index: 1;
      padding: 0;
    }

    /* color classes */
    .cy { color: var(--cy); }
    .yl { color: var(--yl); }
    .mg { color: var(--mg); }
    .rd { color: var(--rd); }
    .bl { color: var(--bl); }
    .gr { color: var(--gr); }
    .dm { color: var(--dm); }

    /* highlight backgrounds */
    .hy  { background: var(--hy); padding: 0 2px; border-radius: 2px; }
    .hyr { background: var(--hyr); padding: 0 2px; border-radius: 2px; }
    .hyg { background: var(--hyg); padding: 0 2px; border-radius: 2px; }
    .hyb { background: var(--hyb); padding: 0 2px; border-radius: 2px; }

    /* mention highlight */
    .mention { background: var(--mn); padding: 0 2px; border-radius: 2px; color: var(--yl); font-weight: bold; }

    /* markdown */
    .st { text-decoration: line-through; }
    .ul { text-decoration: underline; }

    /* ── New message indicator ── */
    #new-msg {
      display: none;
      justify-content: center;
      padding: 4px 0;
      color: var(--cy);
      font-size: 11px;
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
      opacity: 0.7;
    }
    #new-msg.visible { display: flex; }

    /* ── Unread fade ── */
    .unread-fade {
      animation: unreadPulse 1.5s ease-out forwards;
    }
    @keyframes unreadPulse {
      0%   { background: var(--hy); }
      100% { background: transparent; }
    }

    /* ── CRT glitch ── */
    #crt-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 9999;
      pointer-events: none;
      background: var(--bg);
      animation: crtBoot 1.2s ease-out forwards;
    }
    #crt-overlay::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.04) 0px,
        rgba(255,255,255,0.04) 1px,
        transparent 1px,
        transparent 3px
      );
      animation: crtScanlines 1.2s ease-out forwards;
    }
    @keyframes crtBoot {
      0%    { opacity: 1; transform: scaleY(1) translateX(0); }
      4%    { opacity: 1; transform: scaleY(0.004) scaleX(1.3) translateX(0); }
      12%   { opacity: 1; transform: scaleY(0.004) scaleX(1.3) translateX(0); }
      15%   { opacity: 1; transform: scaleY(0.3) translateX(-30px) skewX(-2deg); }
      17%   { opacity: 1; transform: scaleY(0.5) translateX(40px) skewX(3deg); }
      19%   { opacity: 1; transform: scaleY(0.65) translateX(-20px) skewX(-1deg); }
      21%   { opacity: 1; transform: scaleY(0.8) translateX(35px) skewX(2deg); }
      23%   { opacity: 1; transform: scaleY(1.1) scaleX(0.97) translateX(-40px) skewX(-3deg); }
      25%   { opacity: 1; transform: scaleY(0.95) translateX(25px) skewX(2deg); }
      27%   { opacity: 1; transform: scaleY(1.05) translateX(-15px) skewX(-1deg); }
      30%   { opacity: 1; transform: scaleY(1.0) translateX(0) skewX(0); }
      34%   { opacity: 0.95; transform: translateX(20px) skewX(1deg); }
      36%   { opacity: 0.9; transform: translateX(-25px) skewX(-2deg); }
      38%   { opacity: 0.85; transform: translateX(10px) skewX(0); }
      42%   { opacity: 0.8; transform: translateX(-8px); }
      45%   { opacity: 0.7; transform: translateX(0); }
      50%   { opacity: 0.5; transform: translateX(12px); }
      52%   { opacity: 0.45; transform: translateX(-10px); }
      55%   { opacity: 0.35; transform: translateX(0); }
      65%   { opacity: 0.15; }
      80%   { opacity: 0.05; }
      100%  { opacity: 0; }
    }
    @keyframes crtScanlines {
      0%   { opacity: 1; }
      30%  { opacity: 0.9; }
      55%  { opacity: 0.5; }
      100% { opacity: 0; }
    }

    /* ── Logo canvas ── */
    .logo-scope {
      border: 1px solid var(--cy);
      margin: 0 0 4px;
      overflow: hidden;
      position: relative;
      width: 100%;
      max-width: 400px;
      aspect-ratio: 5 / 2;
    }
    .logo-scope::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0) 0px, rgba(0,0,0,0) 1px,
        rgba(0,0,0,0.06) 1px, rgba(0,0,0,0.06) 3px
      );
      pointer-events: none;
    }
    .logo-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* ── Boot oscilloscope ── */
    .boot-scope {
      border: 1px solid var(--cy);
      margin: 8px 0 4px;
      overflow: hidden;
      opacity: 0.8;
      max-width: 400px;
    }
    .boot-hdr {
      font-size: 9px;
      color: var(--dm);
      padding: 2px 8px;
      border-bottom: 1px solid rgba(128,128,128,0.15);
      letter-spacing: 1px;
    }
    .boot-canvas {
      width: 100%;
      height: 55px;
      display: block;
    }
    .boot-logs {
      border-top: 1px solid rgba(128,128,128,0.15);
      padding: 3px 8px;
      font-size: 9px;
      color: var(--dm);
      line-height: 1.5;
    }
    .boot-log-line {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Tappable setup items ── */
    .tap {
      cursor: pointer;
      border-bottom: 1px dashed rgba(128,128,128,0.3);
      transition: background 0.1s;
      padding: 0 2px;
      border-radius: 2px;
    }
    .tap:active { background: var(--hy); }

    /* ── Popup layer (links, mentions) ── */
    #popup {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      background: var(--hdr);
      border-top: 1px solid rgba(128,128,128,0.2);
      flex-shrink: 0;
      font-size: 11px;
      overflow-x: auto;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
    }
    #popup.visible { display: flex; }
    #popup .pk { cursor: pointer; padding: 2px 6px; border: 1px solid rgba(128,128,128,0.3); border-radius: 3px; flex-shrink: 0; }
    #popup .pk:active { background: var(--hy); }
    #popup .pu { color: var(--bl); overflow: hidden; text-overflow: ellipsis; min-width: 0; flex-shrink: 1; }

    /* ── Ghost autocomplete ── */
    #inp-wrap {
      flex: 1;
      position: relative;
      min-width: 0;
    }
    #ghost {
      position: absolute;
      top: 0; left: 0;
      color: var(--dm);
      opacity: 0.4;
      font-family: inherit;
      font-size: 16px;
      line-height: inherit;
      pointer-events: none;
      white-space: pre;
      user-select: none;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: calc(60px + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--hdr);
      color: var(--gr);
      font-family: inherit;
      font-size: 11px;
      padding: 4px 14px;
      border-radius: 4px;
      border: 1px solid rgba(128,128,128,0.2);
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 100;
      pointer-events: none;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <span id="hdr-room"></span>
    <span id="hdr-reconn">⟳ reconnecting...</span>
    <span id="hdr-users"></span>
    <span id="hdr-enc"></span>
  </div>
  <div id="update-bar" onclick="location.reload()">⟳ Update available — tap to reload</div>
  <div id="out"></div>
  <div id="new-msg" onclick="scrollToBottom()">↓ new messages</div>
  <div id="popup"></div>
  <div id="bar">
    <span id="pr">›</span>
    <div id="inp-wrap">
      <input id="inp" type="text"
             autocomplete="off" autocorrect="off"
             autocapitalize="off" spellcheck="false"
             enterkeyhint="send">
      <span id="ghost"></span>
    </div>
  </div>
</div>
<div id="toast"></div>
<div id="crt-overlay"></div>
<script>
'use strict';

// ── Constants ─────────────────────────────────────────────────────────────────
const VER     = '0.5.0';
const DATE    = '22.03.2026';
const DEF_SRV = 'wss://hack.chat/chat-ws';
const K_SRV   = 'hc_server';
const K_NICK  = 'hc_nick';
const K_VAULT = 'hc_vault';
const K_VSALT = 'hc_vault_salt';
const K_THEME = 'hc_theme';
const K_FONT  = 'hc_font';
const K_WAKE  = 'hc_wake';
const K_LOGO  = 'hc_logo';
const NC      = ['cy','yl','mg','rd','bl','gr'];

// ── iOS PWA detection ─────────────────────────────────────────────────────────
const isIOSPWA = window.navigator.standalone === true
  && /iPad|iPhone|iPod/.test(navigator.userAgent);

// ── Themes ────────────────────────────────────────────────────────────────────
const THEMES = {
  default: {
    label: 'Default',
    bg:'#212834', fg:'#d4d4d4', cy:'#4ec9b0', yl:'#e5c07b', mg:'#c678dd',
    rd:'#e06c75', bl:'#61afef', gr:'#98c379', dm:'#a6a6a6', hdr:'#1a1f2b',
    hy:'#3a3000', hyr:'#3a0000', hyg:'#003a00', hyb:'#003040', mn:'#3a3000',
  },
  matrix: {
    label: 'Matrix',
    bg:'#0a0a0a', fg:'#33ff33', cy:'#00ff41', yl:'#66ff66', mg:'#00cc33',
    rd:'#ff3333', bl:'#00ff41', gr:'#33ff33', dm:'#1a8c1a', hdr:'#050505',
    hy:'#0a2a0a', hyr:'#2a0a0a', hyg:'#0a3a0a', hyb:'#0a1a0a', mn:'#0a2a0a',
  },
  nostalgic: {
    label: 'Nostalgic',
    bg:'#1a1210', fg:'#d4c4a8', cy:'#c8a86e', yl:'#e0b060', mg:'#b07848',
    rd:'#c05040', bl:'#8090a0', gr:'#88a060', dm:'#8a7a68', hdr:'#140e0a',
    hy:'#3a2800', hyr:'#3a1000', hyg:'#1a2a00', hyb:'#1a2030', mn:'#3a2800',
  },
  nord: {
    label: 'Nord Light',
    bg:'#eceff4', fg:'#2e3440', cy:'#5e81ac', yl:'#d08770', mg:'#b48ead',
    rd:'#bf616a', bl:'#5e81ac', gr:'#a3be8c', dm:'#7b88a1', hdr:'#e5e9f0',
    hy:'#ebcb8b40', hyr:'#bf616a30', hyg:'#a3be8c30', hyb:'#5e81ac30', mn:'#ebcb8b40',
  },
  space: {
    label: 'Space',
    bg:'#080c18', fg:'#b8c4d8', cy:'#4a8ab8', yl:'#c8a850', mg:'#706898',
    rd:'#b85450', bl:'#5080b8', gr:'#5a9870', dm:'#506078', hdr:'#04060e',
    hy:'#282800', hyr:'#280808', hyg:'#082810', hyb:'#081828', mn:'#282800',
  },
  cassette: {
    label: 'Cassette',
    bg:'#f0e8d0', fg:'#2a2018', cy:'#7830a0', yl:'#e06820', mg:'#c03868',
    rd:'#d03028', bl:'#5028a0', gr:'#608828', dm:'#8a7a60', hdr:'#e8dfc4',
    hy:'#e8682030', hyr:'#d0302830', hyg:'#60882830', hyb:'#5028a030', mn:'#e8682030',
  },
};

function applyTheme(name) {
  const t = THEMES[name] || THEMES.default;
  const r = document.documentElement.style;
  r.setProperty('--bg', t.bg);
  r.setProperty('--fg', t.fg);
  r.setProperty('--cy', t.cy);
  r.setProperty('--yl', t.yl);
  r.setProperty('--mg', t.mg);
  r.setProperty('--rd', t.rd);
  r.setProperty('--bl', t.bl);
  r.setProperty('--gr', t.gr);
  r.setProperty('--dm', t.dm);
  r.setProperty('--hdr', t.hdr);
  r.setProperty('--hy', t.hy);
  r.setProperty('--hyr', t.hyr);
  r.setProperty('--hyg', t.hyg);
  r.setProperty('--hyb', t.hyb);
  r.setProperty('--mn', t.mn);
  // Update meta theme-color for iOS status bar
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.content = t.bg;
  store.set(K_THEME, name);
}

function loadSavedTheme() {
  const saved = localStorage.getItem(K_THEME);
  if (saved && THEMES[saved]) applyTheme(saved);
}

async function showThemePicker() {
  ln();
  ln(`  <span class="cy">Themes:</span>`);
  const names = Object.keys(THEMES);
  const current = localStorage.getItem(K_THEME) || 'default';
  names.forEach((k, i) => {
    const t = THEMES[k];
    const mark = k === current ? ' <span class="gr">◄</span>' : '';
    ln(`    ${tap(String(i + 1), `[${i + 1}]`, t.label)}${mark}`);
  });
  ln();
  ln(`  ${tap('', '[Enter]', 'cancel')}`);
  const v = (await waitInput()).trim();
  const n = parseInt(v);
  if (n >= 1 && n <= names.length) {
    applyTheme(names[n - 1]);
    ln(`  <span class="gr">✓ Theme:</span> ${THEMES[names[n - 1]].label}`);
  } else {
    ln(`  <span class="dm">Cancelled.</span>`);
  }
}

// ── Font size ─────────────────────────────────────────────────────────────────
function applyFontSize(px) {
  const size = Math.max(10, Math.min(16, px));
  document.body.style.fontSize = size + 'px';
  store.set(K_FONT, String(size));
}

function loadSavedFontSize() {
  const saved = store.get(K_FONT);
  if (saved) applyFontSize(parseInt(saved));
}

async function showFontPicker() {
  const cur = parseInt(store.get(K_FONT) || '10');
  ln();
  ln(`  <span class="cy">Font size:</span> ${cur}px`);
  ln(`  ${tap('+', '[+]', 'bigger')}  ${tap('-', '[-]', 'smaller')}  <span class="cy">[10-16]</span> set  ${tap('', '[Enter]', 'done')}`);
  while (true) {
    const v = (await waitInput()).trim();
    if (!v) return;
    const c = parseInt(store.get(K_FONT) || '10');
    if (v === '+') {
      applyFontSize(c + 1);
      ln(`  <span class="gr">→</span> ${Math.min(c + 1, 16)}px`);
    } else if (v === '-') {
      applyFontSize(c - 1);
      ln(`  <span class="gr">→</span> ${Math.max(c - 1, 10)}px`);
    } else {
      const n = parseInt(v);
      if (n >= 10 && n <= 16) {
        applyFontSize(n);
        ln(`  <span class="gr">→</span> ${n}px`);
      } else {
        ln(`  <span class="dm">10-16, + or -</span>`);
      }
    }
  }
}

// ── Wake lock ─────────────────────────────────────────────────────────────────
let wakeLock = null;
let wakeEnabled = false;

async function acquireWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', () => { wakeLock = null; });
  } catch {}
}

function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}

function loadWakeSetting() {
  wakeEnabled = store.get(K_WAKE) === '1';
}

async function toggleWake() {
  wakeEnabled = !wakeEnabled;
  store.set(K_WAKE, wakeEnabled ? '1' : '0');
  if (wakeEnabled && mode === 'chat') {
    await acquireWakeLock();
  } else {
    releaseWakeLock();
  }
}

// ── Logo picker ───────────────────────────────────────────────────────────────
async function showLogoPicker() {
  const cur = store.get(K_LOGO) || '1';
  ln();
  ln(`  <span class="cy">Logo:</span> current = ${cur}`);
  // Render both logos as small canvases
  for (const n of ['1', '2']) {
    const wrap = document.createElement('div');
    wrap.className = 'logo-scope';
    wrap.style.maxWidth = '200px';
    wrap.style.margin = '4px 0';
    const cv = document.createElement('canvas');
    cv.className = 'logo-canvas';
    wrap.appendChild(cv);
    $out.appendChild(wrap);

    const img = new Image();
    img.src = `./logo-${n}.png`;
    img.onload = () => {
      const W = wrap.clientWidth || 200;
      const H = wrap.clientHeight || Math.round(W * 2 / 5);
      cv.width = W; cv.height = H;
      const ctx = cv.getContext('2d');
      ctx.drawImage(img, 0, 0, W, H);
    };
    const mark = n === cur ? ' <span class="gr">◄</span>' : '';
    ln(`    ${tap(n, `[${n}]`)}${mark}`);
  }
  ln();
  ln(`  ${tap('', '[Enter]', 'cancel')}`);
  const v = (await waitInput()).trim();
  if (v === '1' || v === '2') {
    store.set(K_LOGO, v);
    ln(`  <span class="gr">✓ Logo ${v} — visible on next launch.</span>`);
  } else {
    ln(`  <span class="dm">Cancelled.</span>`);
  }
}

// ── Options menu ──────────────────────────────────────────────────────────────
async function showOptions() {
  const hasWL = 'wakeLock' in navigator;
  ln();
  ln(`  <span class="cy"><strong>Options</strong></span>`);
  ln(`    ${tap('1', '[1]', 'Theme')}`);
  ln(`    ${tap('2', '[2]', 'Font size')}`);
  let nextN = 3;
  if (hasWL) {
    const wSt = wakeEnabled ? '<span class="gr">ON</span>' : '<span class="dm">OFF</span>';
    ln(`    ${tap(String(nextN), `[${nextN}]`, `Keep screen awake  ${wSt}`)}`);
    nextN++;
  }
  ln(`    ${tap(String(nextN), `[${nextN}]`, 'Logo')}`);
  const logoN = nextN;
  ln();
  ln(`  ${tap('', '[Enter]', 'back')}`);
  const v = (await waitInput()).trim();
  if (v === '1') { await showThemePicker(); return await showOptions(); }
  if (v === '2') { await showFontPicker(); return await showOptions(); }
  if (hasWL && v === '3') {
    await toggleWake();
    if (wakeEnabled) {

}

// ── Typewriter engine ─────────────────────────────────────────────────────────
const typeQueue = [];
let typing = false;
let typeTimer = null;

function flushType() {
  if (typeTimer) { clearInterval(typeTimer); typeTimer = null; }
  typeQueue.length = 0;
  typing = false;
}

function print(html, typed = false, forceScroll = true) {
  const atBottom = $out.scrollTop + $out.clientHeight >= $out.scrollHeight - 10;
  const shouldScroll = forceScroll || atBottom;
  const s = document.createElement('span');
  s.className = 'ln';
  s.innerHTML = html;

  if (typed) {
    // Collect text nodes, store full text, empty them
    const nodes = [];
    const walker = document.createTreeWalker(s, NodeFilter.SHOW_TEXT);
    let n;
    while (n = walker.nextNode()) {
      if (n.textContent.length > 0) {
        nodes.push({ node: n, full: n.textContent });
        n.textContent = '';
      }
    }
    // Skip typewriter for whitespace-only content
    const totalText = nodes.map(n => n.full).join('');
    if (!totalText.trim()) {
      nodes.forEach(n => n.node.textContent = n.full);
      $out.appendChild(s);
      if (shouldScroll) $out.scrollTop = $out.scrollHeight;
      return;
    }

    $out.appendChild(s);
    if (shouldScroll) $out.scrollTop = $out.scrollHeight;

    if (nodes.length > 0) {
      typeQueue.push({ nodes, forceScroll: shouldScroll });
      if (!typing) processTypeQueue();
    }
  } else {
    $out.appendChild(s);
    if (shouldScroll) $out.scrollTop = $out.scrollHeight;
  }
}

function processTypeQueue() {
  if (typeQueue.length === 0) { typing = false; return; }

  // If queue backs up, flush all but last instantly
  while (typeQueue.length > 3) {
    const item = typeQueue.shift();
    item.nodes.forEach(n => n.node.textContent = n.full);
  }

  typing = true;
  const { nodes, forceScroll } = typeQueue.shift();

  // Build flat char list across all text nodes
  const chars = [];
  for (const { node, full } of nodes) {
    for (const ch of full) chars.push({ node, ch });
  }

  let i = 0;
  // Adaptive: finish in ~50 ticks (≈600ms), min 8ms interval
  const interval = Math.max(8, Math.round(600 / chars.length));
  const perTick = Math.max(1, Math.ceil(chars.length / 50));

  const timer = setInterval(() => {
    if (i >= chars.length) {
      clearInterval(timer);
      typeTimer = null;
      processTypeQueue();
      return;
    }
    // Speed up if queue is building
    const batch = typeQueue.length > 0 ? perTick * 3 : perTick;
    for (let b = 0; b < batch && i < chars.length; b++, i++) {
      chars[i].node.textContent += chars[i].ch;
    }
    const atBot = $out.scrollTop + $out.clientHeight >= $out.scrollHeight - 10;
    if (forceScroll || atBot) $out.scrollTop = $out.scrollHeight;
  }, interval);
  typeTimer = timer;
}

function showLinkPopup(url) {
  hidePopup();
  popupMode = 'link';
  const short = url.length > 40 ? url.slice(0, 40) + '…' : url;

  let html = '';
  if (navigator.share) {
    html += `<span class="pk cy" data-act="share">[o]pen in…</span>`;
  }
  html += `<span class="pk cy" data-act="copy">[c]opy</span>`;
  html += `<span class="pu">${esc(short)}</span>`;

  $popup.innerHTML = html;
  $popup.dataset.url = url;
  $popup.classList.add('visible');

  // Keyboard shortcuts while popup open
  const onKey = (e) => {
    if (popupMode !== 'link') { document.removeEventListener('keydown', onKey); return; }
    if (e.key === 'o' && navigator.share) {
      e.preventDefault();
      doLinkAction('share', url);
      document.removeEventListener('keydown', onKey);
    } else if (e.key === 'c') {
      e.preventDefault();
      doLinkAction('copy', url);
      document.removeEventListener('keydown', onKey);
    } else if (e.key === 'Escape') {
      hidePopup();
      document.removeEventListener('keydown', onKey);
    }
  };
  document.addEventListener('keydown', onKey);
}

async function doLinkAction(act, url) {
  if (act === 'share') {
    try { await navigator.share({ url }); } catch {}
  } else if (act === 'copy') {
    try {
      await navigator.clipboard.writeText(url);
      showToast('URL copied');
    } catch {}
  }
  hidePopup();
}

// ── Crypto (Web Crypto API) ───────────────────────────────────────────────────
const TE = new TextEncoder();
const TD = new TextDecoder();

async function sha256raw(data) {
  return new Uint8Array(await crypto.subtle.digest('SHA-256', data));
}

async function sha256hex(s) {
  const buf = await sha256raw(TE.encode(s));
  return [...buf].map(b => b.toString(16).padStart(2,'0')).join('');
}

async function deriveBaseKey(phrase) {
  const km = await crypto.subtle.importKey('raw', TE.encode(phrase), 'HKDF', false, ['deriveBits']);
  const bits = await crypto.subtle.deriveBits(
    { name:'HKDF', hash:'SHA-256', salt:TE.encode('hcpy-room-v1'), info:TE.encode('crypto') },
    km, 256
  );
  return new Uint8Array(bits);
}

async function deriveRoomName(phrase) {
  const km = await crypto.subtle.importKey('raw', TE.encode(phrase), 'PBKDF2', false, ['deriveBits']);
  const bits = await crypto.subtle.deriveBits(
    { name:'PBKDF2', hash:'SHA-256', salt:TE.encode('hcpy-room-v2'), iterations: 500000 },
    km, 256
  );
  return [...new Uint8Array(bits)].map(b => b.toString(16).padStart(2,'0')).join('');
}

function periodStr(offsetH = 0) {
  const d = new Date(Date.now() + offsetH * 3600000);
  return [
    d.getUTCFullYear(),
    String(d.getUTCMonth()+1).padStart(2,'0'),
    String(d.getUTCDate()).padStart(2,'0'),
    String(d.getUTCHours()).padStart(2,'0')
  ].join('-');
}

async function periodAESKey(bk, pid, usage) {
  const hk  = await crypto.subtle.importKey('raw', bk, {name:'HMAC', hash:'SHA-256'}, false, ['sign']);
  const sig  = await crypto.subtle.sign('HMAC', hk, TE.encode(pid));
  return crypto.subtle.importKey('raw', sig, {name:'AES-GCM'}, false, [usage]);
}

async function encMsg(plain) {
  const pid = periodStr(0);
  const key = await periodAESKey(baseKey, pid, 'encrypt');
  const iv  = crypto.getRandomValues(new Uint8Array(12));
  const ct  = new Uint8Array(await crypto.subtle.encrypt({name:'AES-GCM', iv}, key, TE.encode(plain)));
  const raw = new Uint8Array(12 + ct.byteLength);
  raw.set(iv); raw.set(ct, 12);
  let bin = '';
  for (let i = 0; i < raw.length; i++) bin += String.fromCharCode(raw[i]);
  return `enc:${pid}:${btoa(bin)}`;
}

async function decMsg(text) {
  if (!text.startsWith('enc:') || !baseKey) return null;
  try {
    const [, pid, b64] = text.split(':', 3);
    const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const iv  = raw.slice(0, 12);
    const ct  = raw.slice(12);
    for (const off of [0, -1, 1]) {
      try {
        const key = await periodAESKey(baseKey, periodStr(off), 'decrypt');
        const pt  = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ct);
        return TD.decode(pt);
      } catch {}
    }
  } catch {}
  return null;
}

// ── Fingerprint (emoji) ───────────────────────────────────────────────────────
async function getFingerprint(bk) {
  const hash = await sha256raw(bk);
  return [hash[0], hash[1], hash[2], hash[3]]
    .map(b => FP_EMOJI[b % FP_EMOJI.length])
    .join(' ');
}

function showFingerprint() {
  if (!baseKey) {
    ln(`  <span class="yl">No encryption key — fingerprint not available.</span>`);
    return;
  }
  getFingerprint(baseKey).then(fp => {
    ln(`  <span class="cy">Key fingerprint:</span>  ${fp}`);
    ln(`  <span class="dm">Compare with your partner to verify same key.</span>`);
  });
}

// ── Vault (encrypted room storage) ────────────────────────────────────────────
async function vaultKey(password, salt) {
  const km = await crypto.subtle.importKey('raw', TE.encode(password), 'PBKDF2', false, ['deriveBits']);
  const bits = await crypto.subtle.deriveBits(
    { name:'PBKDF2', hash:'SHA-256', salt, iterations: 100000 },
    km, 256
  );
  return crypto.subtle.importKey('raw', bits, {name:'AES-GCM'}, false, ['encrypt','decrypt']);
}

async function vaultEncrypt(data, password) {
  let salt = null;
  const savedSalt = store.get(K_VSALT);
  if (savedSalt) {
    salt = Uint8Array.from(atob(savedSalt), c => c.charCodeAt(0));
  } else {
    salt = crypto.getRandomValues(new Uint8Array(16));
    let bin = '';
    for (let i = 0; i < salt.length; i++) bin += String.fromCharCode(salt[i]);
    store.set(K_VSALT, btoa(bin));
  }
  const key = await vaultKey(password, salt);
  const iv  = crypto.getRandomValues(new Uint8Array(12));
  const ct  = new Uint8Array(await crypto.subtle.encrypt(
    {name:'AES-GCM', iv}, key, TE.encode(JSON.stringify(data))
  ));
  const raw = new Uint8Array(12 + ct.byteLength);
  raw.set(iv); raw.set(ct, 12);
  let bin = '';
  for (let i = 0; i < raw.length; i++) bin += String.fromCharCode(raw[i]);
  return btoa(bin);
}

async function vaultDecrypt(b64, password) {
  const savedSalt = store.get(K_VSALT);
  if (!savedSalt) return null;
  const salt = Uint8Array.from(atob(savedSalt), c => c.charCodeAt(0));
  const key  = await vaultKey(password, salt);
  const raw  = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const iv   = raw.slice(0, 12);
  const ct   = raw.slice(12);
  try {
    const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ct);
    return JSON.parse(TD.decode(pt));
  } catch {
    return null;
  }
}

    if (!cmd) return null;
    const delMatch = cmd.match(/^\/del\s+(\d+)$/i);

      const idx = parseInt(delMatch[1]) - 1;
      if (idx >= 0 && idx < rooms.length) {
        const removed = rooms.splice(idx, 1)[0];
        const label = removed.phrase || ('?' + removed.room);
        const enc = await vaultEncrypt(rooms, password);
        store.set(K_VAULT, enc);
        ln(`  <span class="dm">Removed: ${esc(label.slice(0,24))}</span>`);
        if (rooms.length === 0) {
          ln(`  <span class="dm">Vault is now empty.</span>`);
          return null;
        }
        rooms.forEach((r, i) => {
          const l = r.phrase
            ? `<span class="gr">[enc]</span> ${esc(r.phrase.length > 20 ? r.phrase.slice(0,20)+'…' : r.phrase)}`
            : `<span class="dm">[pub]</span> ?${esc(r.room)}`;

      ln(`  <span class="rd">! Invalid number.</span>`);
      continue;

      return { entry: rooms[n - 1], password };

    ln(`  <span class="rd">! Enter a number 1-${rooms.length}, /del N, or Enter to cancel.</span>`);
  }

// ── Markdown ──────────────────────────────────────────────────────────────────
function md(s) {
  s = esc(s);
  // @mentions — highlight if it's our nick
  s = s.replace(/@(\w+)/g, (m, nick) => {
    if (nick.toLowerCase() === curNick.toLowerCase()) {
      return `<span class="mention">@${nick}</span>`;
    }
    return `<span class="cy">@${nick}</span>`;
  });
  s = s.replace(/`(.+?)`/g,             '<span class="dm cy">$1</span>');
  s = s.replace(/\*\*\*(.+?)\*\*\*/g,   '<strong><em>$1</em></strong>');
  s = s.replace(/\*\*(.+?)\*\*/g,       '<strong>$1</strong>');
  s = s.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
  s = s.replace(/~~(.+?)~~/g,           '<span class="st">$1</span>');
  s = s.replace(/__(.+?)__/g,           '<span class="ul">$1</span>');
  s = s.replace(/==(.+?)==/g, (_, t) => {
    if (t.length > 2 && t[1] === ':') {
      const cls = {r:'hyr', g:'hyg', b:'hyb'}[t[0]] ?? 'hy';
      return `<span class="${cls}">${esc(t.slice(2))}</span>`;
    }
    return `<span class="hy">${t}</span>`;
  });
  // [text](url) markdown links
  s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,
    '<a href="$2" target="_blank" rel="noopener" class="bl" style="text-decoration:underline">$1</a>');
  // Bare URLs (not already inside href="...")
  s = s.replace(/(?<!href="|">)(https?:\/\/[^\s<&]+)/g,
    '<a href="$1" target="_blank" rel="noopener" class="bl" style="text-decoration:underline">$1</a>');
  return s;
}

function nickCls(n) {

// ── Sound ─────────────────────────────────────────────────────────────────────
let audioCtx = null;
function beep(freq = 660, duration = 0.08) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + duration);
  } catch {}
}

function notify(who, room, isMention) {
  if (document.hasFocus() && !isMention) return;
  // Beep: short for regular, double for mention
  if (isMention) {
    beep(880, 0.08);
    setTimeout(() => beep(1100, 0.1), 120);
  } else {
    beep(660, 0.08);
  }
  if (notifOK) {
    const body = isMention
      ? `${who} mentioned you in ?${room.slice(0,12)}`
      : `${who} in ?${room.slice(0,12)}`;
    new Notification('hc', { body, silent: false });
  }
}

// ── Print screens ─────────────────────────────────────────────────────────────
function banner() {
  // ── Canvas logo ──
  const container = document.createElement('div');
  container.className = 'logo-scope';
  const canvas = document.createElement('canvas');
  canvas.className = 'logo-canvas';
  container.appendChild(canvas);
  $out.appendChild(container);

  const logoImg = new Image();
  const logoN = store.get(K_LOGO) || '1';
  logoImg.src = `./logo-${logoN}.png`;

  logoImg.onload = () => {
    const W = container.clientWidth || 400;
    const H = container.clientHeight || Math.round(W * 2 / 5);
    canvas.width = W;
    canvas.height = H;

    // Get pixel data from offscreen canvas
    const off = document.createElement('canvas');
    off.width = W; off.height = H;
    const offCtx = off.getContext('2d');
    offCtx.drawImage(logoImg, 0, 0, W, H);
    const srcData = offCtx.getImageData(0, 0, W, H).data;

    const ctx = canvas.getContext('2d', { alpha: false });
    const pxSize = 2;
    const pxGap = 0.5;
    const threshold = 25;
    const glitchStrength = 16;
    const scanArea = 10;
    let scanY = -scanArea;
    let running = true;

    function themeColor(v) {
      return getComputedStyle(document.documentElement).getPropertyValue(v).trim();
    }

    function hexToRGB(hex) {
      hex = hex.replace('#', '');
      if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
      return [parseInt(hex.slice(0,2),16), parseInt(hex.slice(2,4),16), parseInt(hex.slice(4,6),16)];
    }

    function draw() {
      if (!running || !canvas.isConnected) { running = false; return; }

      const bg = themeColor('--bg') || '#212834';
      const cy = themeColor('--cy') || '#4ec9b0';
      const [cr, cg, cb] = hexToRGB(cy);

      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, W, H);

      for (let y = 0; y < H; y += pxSize) {
        const distScan = Math.abs(y - scanY);
        const inGlitch = distScan < scanArea;

        for (let x = 0; x < W; x += pxSize) {
          const i = (y * W + x) * 4;
          const bright = srcData[i] * 0.299 + srcData[i+1] * 0.587 + srcData[i+2] * 0.114;

          if (bright > threshold) {
            const a = Math.min(1, bright / 255);
            let dx = x;

            if (inGlitch) {
              const intensity = 1 - distScan / scanArea;
              dx += (Math.random() - 0.5) * glitchStrength * intensity;
              const boost = Math.min(1, a + 0.15);
              ctx.fillStyle = `rgba(${cr},${cg},${cb},${boost})`;
            } else {
              ctx.fillStyle = `rgba(${cr},${cg},${cb},${a})`;
            }
            ctx.fillRect(dx, y, pxSize - pxGap, pxSize - pxGap);
          }
        }
      }

      scanY += 0.8;
      if (scanY > H + scanArea) scanY = -scanArea;
      requestAnimationFrame(draw);
    }

    draw();
  };

  logoImg.onerror = () => {
    // Fallback: ASCII banner
    container.remove();
    ln(`<span class="cy">  hc.py</span>`, false);
  };

  ln();
  ln(`  <span class="dm">v${VER} · ${DATE} · tiny hack.chat client</span>`);
  ln(`  <span class="dm">by </span><strong>Chalcenterus9</strong><span class="dm"> & </span><strong>Claude AI</strong><span class="dm">  ·  MIT License</span>`);
  ln(`  <span class="dm">E2E encryption · PBKDF2 rooms · markdown · self-hosted</span>`);
  ln();
}

// ── Boot oscilloscope ─────────────────────────────────────────────────────────
function startBootSequence() {
  const container = document.createElement('div');
  container.className = 'boot-scope';

  const hdr = document.createElement('div');
  hdr.className = 'boot-hdr';
  hdr.textContent = '┤ SIGNAL MONITOR ├';
  container.appendChild(hdr);

  const canvas = document.createElement('canvas');
  canvas.className = 'boot-canvas';
  canvas.width = 300;
  canvas.height = 55;
  container.appendChild(canvas);

  const logEl = document.createElement('div');
  logEl.className = 'boot-logs';
  container.appendChild(logEl);

  $out.appendChild(container);

  // Resize canvas to actual pixel width for crisp rendering
  requestAnimationFrame(() => {
    const w = container.clientWidth;
    if (w > 0) { canvas.width = w; }
  });

  const ctx = canvas.getContext('2d');
  let phase = Math.random() * Math.PI * 2;
  let freq = 0.03 + Math.random() * 0.02;
  let amp = 12 + Math.random() * 10;
  let freqTarget = freq;
  let ampTarget = amp;
  let running = true;
  let rafId = null;

  function themeColor(v) {
    return getComputedStyle(document.documentElement).getPropertyValue(v).trim();
  }

  function draw() {
    if (!running || !canvas.isConnected) {
      running = false;
      clearInterval(logTimer);
      return;
    }
    const cy = themeColor('--cy') || '#4ec9b0';
    const W = canvas.width, H = canvas.height;

    // Drift targets randomly
    if (Math.random() < 0.005) {
      freqTarget = 0.015 + Math.random() * 0.06;
      ampTarget = 8 + Math.random() * 18;
    }
    freq += (freqTarget - freq) * 0.015;
    amp += (ampTarget - amp) * 0.015;

    ctx.clearRect(0, 0, W, H);

    // Grid
    ctx.globalAlpha = 0.08;
    ctx.strokeStyle = cy;
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 24) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y < H; y += 11) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    // Center line
    ctx.globalAlpha = 0.15;
    ctx.beginPath();
    ctx.moveTo(0, H / 2);
    ctx.lineTo(W, H / 2);
    ctx.stroke();

    // Sine wave
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.strokeStyle = cy;
    ctx.lineWidth = 1.5;
    ctx.shadowColor = cy;
    ctx.shadowBlur = 6;

    for (let x = 0; x < W; x++) {
      const noise = (Math.random() - 0.5) * 1.2;
      const y = (H / 2) + amp * Math.sin(x * freq + phase) + noise;
      if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;

    phase += 0.09;
    rafId = requestAnimationFrame(draw);
  }

  // Fake log messages
  const LOGS = [
    () => `INIT crypto_module... OK`,
    () => `SCAN wss://hack.chat:443... OPEN`,
    () => `LOAD e2e_engine v2.${Math.floor(Math.random()*9)}.${Math.floor(Math.random()*20)}`,
    () => `SYNC clock_drift: +${(Math.random()*0.01).toFixed(4)}ms`,
    () => `HASH pbkdf2_room_v2 [500k iter]... READY`,
    () => `PROBE signal_${Math.random().toString(16).slice(2,6)}... ACK`,
    () => `ALLOC buffer 0x${Math.random().toString(16).slice(2,10).toUpperCase()}`,
    () => `VERIFY cert_chain... TRUSTED`,
    () => `MOUNT /dev/ws0 → relay`,
    () => `CHECK entropy_pool: ${(Math.random()*100).toFixed(1)}%`,
    () => `BIND socket_${Math.floor(Math.random()*9999)}... LISTENING`,
    () => `PING rtt=${Math.floor(Math.random()*50+10)}ms jitter=${Math.floor(Math.random()*5)}ms`,
    () => `SEED prng 0x${Math.random().toString(16).slice(2,14).toUpperCase()}`,
    () => `DERIVE hkdf_key period_${periodStr(0)}`,
    () => `REGISTER handler_ws... ATTACHED`,
    () => `GC sweep: ${Math.floor(Math.random()*200+50)} objects freed`,
  ];

  function addLog() {
    if (!running) return;
    const line = document.createElement('div');
    line.className = 'boot-log-line';
    line.textContent = '› ' + LOGS[Math.floor(Math.random() * LOGS.length)]();
    logEl.appendChild(line);
    while (logEl.children.length > 4) logEl.removeChild(logEl.firstChild);
  }

  // Stagger initial logs
  addLog();
  setTimeout(() => addLog(), 250);
  setTimeout(() => addLog(), 600);

  const logTimer = setInterval(() => addLog(), 1200 + Math.random() * 800);
  draw();
}

// ── Check if a command is native (bypass encryption) ──────────────────────────
function isNativeCmd(text) {
  const cmd = text.split(/\s/)[0].toLowerCase();
  return NATIVE_CMDS.has(cmd);
}

// ── Chat command handler ───────────────────────────────────────────────────────
async function handleChat(text) {
  const s = text.trim();
  if (!s) return;

  if (s === '/exit' || s === '/quit' || s === '/restart') {
    cancelReconnect();
    ws?.close(); ws = null;
    hideHeader();
    ln(`  <span class="dm">Reloading...</span>`);
    setTimeout(() => location.reload(), 400);
    return;
  }
  if (s === '/nuke') {
    mode = 'setup';
    hideHeader();
    const ok = await nuke();
    if (!ok) { mode = 'chat'; showHeader(); }
    return;
  }
  if (s === '/clear')  { flushType(); $out.innerHTML = ''; return; }
  if (s === '/room')   { ln(`  Room: <span class="cy">?${esc(curRoom)}</span>`); return; }
  if (s === '/who')    { ln(`  Online (${users.size}): <span class="cy">${[...users].sort().map(esc).join(', ')}</span>`); return; }
  if (s === '/format') { fmtHelp(); return; }
  if (s === '/readme') { readme(); return; }
  if (s === '/help')   { showHelp(); return; }
  if (s === '/fp')     { showFingerprint(); return; }

  if (s === '/theme') {
    await showThemePicker();
    return;
  }

  if (s === '/options') {
    await showOptions();
    return;
  }

  if (s === '/save') {
    await saveToVault();
    return;
  }

  if (s === '/enc') {
    if (!baseKey) {
      ln(`  <span class="yl">No phrase set — reconnect with a secret phrase to use encryption.</span>`);
    } else {
      encOn = !encOn;
      ln(`  Encryption: ${encOn ? '<span class="gr">ON</span>' : '<span class="yl">OFF</span>'}`);
      updateEncIcon();
    }
    return;
  }

  // Emote shortcuts → expand to /me
  const EMOTES = {
    '/shrug':  '¯\\_(ツ)_/¯',
    '/lenny':  '( ͡° ͜ʖ ͡°)',
    '/flip':   '(╯°□°)╯︵ ┻━┻',
    '/unflip': '┬─┬ノ( º _ ºノ)',
    '/hug':    'hugs $1 ⊂(◉‿◉)つ',
    '/slap':   'slaps $1 with a large trout',
    '/wave':   'waves at $1 ヾ(＾∇＾)',
    '/dance':  '♪┏(・o・)┛♪┗(・o・)┓♪',
  };
  const emoteMatch = s.match(/^(\/\w+)(?:\s+@?(.+))?$/);
  if (emoteMatch && EMOTES[emoteMatch[1].toLowerCase()]) {
    const target = emoteMatch[2] || 'everyone';
    const template = EMOTES[emoteMatch[1].toLowerCase()].replace('$1', target);
    const meText = `/me ${template}`;
    ws?.send(JSON.stringify({ cmd:'chat', text: meText }));
    return;
  }

  // /dm @nick msg → /whisper nick msg (client alias)
  const dmMatch = s.match(/^\/dm\s+@?(\S+)\s+([\s\S]+)$/i);
  if (dmMatch) {
    const payload = `/whisper ${dmMatch[1]} ${dmMatch[2]}`;
    ws?.send(JSON.stringify({ cmd:'chat', text: payload }));
    ln(`${ts()} <span class="mg">→ whisper to ${esc(dmMatch[1])}</span>: ${md(dmMatch[2])}`);
    scrollToBottom();
    return;
  }

  // Native server commands — always plaintext
  if (s.startsWith('/') && isNativeCmd(s)) {
    ws?.send(JSON.stringify({ cmd:'chat', text: s }));
    return;
  }

  // Regular message — encrypt if enabled
  let payload = text;
  if (encOn && baseKey) payload = await encMsg(text);
  ws?.send(JSON.stringify({ cmd:'chat', text: payload }));
  scrollToBottom();
}

// ── Reconnect logic ───────────────────────────────────────────────────────────
function cancelReconnect() {
  if (reconnTimer) { clearTimeout(reconnTimer); reconnTimer = null; }
  reconnecting = false;
  reconnCount = 0;
  $hdrReconn.style.display = 'none';
}

function scheduleReconnect() {
  if (mode !== 'chat' || reconnecting) return;
  reconnecting = true;
  reconnCount++;
  // Exponential backoff: 1s, 2s, 4s, 8s, max 15s
  const delay = Math.min(1000 * Math.pow(2, reconnCount - 1), 15000);
  $hdrReconn.style.display = '';
  ln(`${ts()} <span class="yl">⟳ Reconnecting in ${(delay/1000).toFixed(0)}s...</span>`);

  reconnTimer = setTimeout(() => {
    reconnTimer = null;
    doReconnect();
  }, delay);
}

function doReconnect() {
  if (mode !== 'chat') { cancelReconnect(); return; }

  ws?.close();
  ws = new WebSocket(curServer);

  ws.onopen = () => {
    ws.send(JSON.stringify({ cmd:'join', channel: curRoom, nick: curFullNick }));
    reconnecting = false;
    reconnCount = 0;
    $hdrReconn.style.display = 'none';
    ln(`${ts()} <span class="gr">✓ Reconnected</span>`);
  };

  ws.onerror = () => {
    ln(`${ts()} <span class="rd">! Reconnect error</span>`);
  };

  ws.onclose = () => {
    if (mode === 'chat') scheduleReconnect();
  };

  ws.onmessage = handleWsMessage;
}

// ── WebSocket message handler (shared between connect and reconnect) ──────────
async function handleWsMessage({ data }) {
  const d   = JSON.parse(data);
  const cmd = d.cmd;
  const wasAtBottom = isAtBottom();

  if (cmd === 'chat') {
    const who = d.nick || '';
    let rawText = d.text || '';
    let text = rawText;
    let isMention = false;

    if (text.startsWith('enc:')) {
      if (baseKey && encOn) {
        const pt = await decMsg(text);
        if (pt !== null) {
          text = md(pt);
          isMention = pt.toLowerCase().includes('@' + curNick.toLowerCase());
        } else {
          text = `<span class="dm">[encrypted — wrong key or period]</span>`;
        }
      } else {
        text = `<span class="dm">[encrypted]</span>`;
      }
    } else {
      isMention = rawText.toLowerCase().includes('@' + curNick.toLowerCase());
      text = md(text);
    }

    const trip = d.trip ? ` <span class="dm">(${esc(d.trip)})</span>` : '';
    const isOwn = who === curNick;
    ln(`${ts()} <span class="${nickCls(who)}"><strong>${esc(who)}</strong></span>${trip}: ${text}`, !isOwn, isOwn || wasAtBottom);

    if (isOwn) {
      // Always scroll to own message
      scrollToBottom();
    } else {
      notify(who, curRoom, isMention);
      if (!wasAtBottom) {
        // Mark as unread
        const last = $out.lastElementChild;
        if (last) last.classList.add('unread');
        showNewMsgIndicator();
      }
    }
  }
  else if (cmd === 'onlineSet') {
    users = new Set(d.nicks || []);
    ln(`${ts()} <span class="dm">Online: ${(d.nicks||[]).map(esc).join(', ')}</span>`, true);
    updateUsersCount();
  }
  else if (cmd === 'onlineAdd') {
    users.add(d.nick);
    ln(`${ts()} <span class="yl">+ ${esc(d.nick)} joined</span>`, true);
    updateUsersCount();
    if (!wasAtBottom) {
      const last = $out.lastElementChild;
      if (last) last.classList.add('unread');
      showNewMsgIndicator();
    }
  }
  else if (cmd === 'onlineRemove') {
    users.delete(d.nick);
    ln(`${ts()} <span class="dm">- ${esc(d.nick)} left</span>`, true);
    updateUsersCount();
  }
  else if (cmd === 'info') { ln(`${ts()} <span class="dm">i: ${esc(d.text||'')}</span>`, true); }
  else if (cmd === 'warn') {
    const warnText = d.text || '';
    ln(`${ts()} <span class="rd">! ${esc(warnText)}</span>`, true);
    // Nick taken — ghost session still alive on server, auto-retry
    if (mode === 'chat' && /nick/i.test(warnText)) {
      ln(`${ts()} <span class="yl">⟳ Ghost session detected — retrying in 5s...</span>`);
      cancelReconnect();
      reconnecting = true;  // prevent onclose from scheduling its own reconnect
      $hdrReconn.style.display = '';
      reconnTimer = setTimeout(() => {
        reconnTimer = null;
        reconnecting = false;
        doReconnect();
      }, 5000);
    }
  }
}

// ── Connect ───────────────────────────────────────────────────────────────────
function connectChat(server, room, nick) {
  curRoom     = room;
  curNick     = nick.split('#')[0];
  curServer   = server;
  curFullNick = nick;
  users       = new Set();

  const short = room.length > 16 ? room.slice(0,16) + '…' : room;

  // Set page title to room name
  document.title = `hc — ?${short}`;

  return new Promise(resolve => {
    resolveChat = resolve;

    ln();
    ln(`  <span class="dm">Connecting...</span>`);
    ws = new WebSocket(server);

    ws.onopen = () => {
      ws.send(JSON.stringify({ cmd:'join', channel:room, nick }));
      const enc = encOn && baseKey
        ? `<span class="gr">[ENC ON]</span>`
        : `<span class="dm">[no enc]</span>`;
      ln(`  <span class="dm">Connected to</span> <span class="cy">?${esc(short)}</span>  ${enc}`);
      if (ghostMode) ln(`  <span class="dm">👻 ghost mode — nothing saved</span>`);
      // Show fingerprint on connect if encrypted
      if (encOn && baseKey) {
        getFingerprint(baseKey).then(fp => {
          ln(`  <span class="dm">Key fingerprint:</span>  ${fp}`);
        });
      }
      ln(`  <span class="dm">/help for commands</span>`);
      ln();
      mode = 'chat';
      showHeader();
      // Force scroll to bottom so user sees the chat
      requestAnimationFrame(() => { $out.scrollTop = $out.scrollHeight; });
      $inp.focus();
      askNotif();
      if (wakeEnabled) acquireWakeLock();
    };

    ws.onerror = () => {
      ln(`${ts()} <span class="rd">! Connection error</span>`);
    };

    ws.onclose = () => {
      if (mode === 'chat' && resolveChat) {
        // Don't resolve — try to reconnect
        scheduleReconnect();
      } else if (resolveChat) {
        resolveChat('disconnected');
        resolveChat = null;
      }
    };

    ws.onmessage = handleWsMessage;
  });
}

// ── Visibility change: reconnect when returning from background ───────────────
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && mode === 'chat') {
    // Re-acquire wake lock (iOS releases it on background)
    if (wakeEnabled) acquireWakeLock();
    // Check if WebSocket is dead
    if (!ws || ws.readyState === WebSocket.CLOSED || ws.readyState === WebSocket.CLOSING) {
      cancelReconnect();
      reconnCount = 0;
      scheduleReconnect();
    }
  }
});

// ── Main loop ─────────────────────────────────────────────────────────────────
async function main() {
  loadSavedTheme();
  loadSavedFontSize();
  loadWakeSetting();
  let first = true;

  while (true) {
    flushType();
    $out.innerHTML = '';
    mode = 'setup';
    hideHeader();
    curPhrase = '';
    ghostMode = false;

    document.title = 'hc — hack.chat';

    if (first) {
      banner();
      startBootSequence();
      const vaultHint = hasVault() ? `  ${tap('/vault', '[/vault]', 'saved rooms')}` : '';
      ln(`  ${tap('', '[Enter]', 'start')}  ${tap('/readme', '[/readme]', 'guide')}  ${tap('/ghost', '[/ghost]', 'stealth')}`);
      ln(`  ${tap('/options', '[/options]', 'settings')}${vaultHint}`);
      const c = (await waitInput()).trim();

      if (c === '/readme') {
        readme();
        await waitInput();
        flushType();
        $out.innerHTML = '';
        first = false;
        continue;
      }

      if (c === '/options') {
        await showOptions();
        flushType();
        $out.innerHTML = '';
        first = false;
        continue;
      }

      if (c === '/ghost') {
        ghostMode = true;
        ln(`  <span class="dm">👻 Ghost mode — nothing will be saved to device.</span>`);
      }

      if (c === '/vault') {
        const result = await showVaultAndPick();
        if (result) {
          first = false;
          const { entry } = result;
          if (entry.phrase) {
            curPhrase = entry.phrase;
            ln(`  <span class="dm">Deriving room key...</span>`);
            const h = await deriveRoomName(entry.phrase);
            baseKey = await deriveBaseKey(entry.phrase);
            encOn = true;
            await connectChat(entry.server, h, entry.nick);
          } else {
            baseKey = null; encOn = false;
            await connectChat(entry.server, entry.room, entry.nick);
          }
          cancelReconnect();
          hideHeader();
          ln();
          ln(`  <span class="dm">Back to start...</span>`);
          await new Promise(r => setTimeout(r, 600));
          continue;
        }
        // Cancelled — back to start
        location.reload();
        return;
      }

      first = false;
    }

    ln(`  <span class="cy"><strong>hc</strong></span><span class="dm">.py v${VER}</span>`);
    if (ghostMode) ln(`  <span class="dm">👻 ghost</span>`);
    ln();

    const server = await setupServer();
    if (server === HOME) return;
    const room   = await setupRoom();
    if (room === HOME) return;
    const nick   = await setupNick();
    if (nick === HOME) return;

    if (!nick) {
      ln(`  <span class="rd">! Nickname is required.</span>`);
      await new Promise(r => setTimeout(r, 1000));
      continue;
    }

    const reason = await connectChat(server, room, nick);

    // quit or disconnected → loop back to setup
    cancelReconnect();
    hideHeader();
    ln();
    ln(`  <span class="dm">Back to start...</span>`);
    await new Promise(r => setTimeout(r, 600));
  }
}

// ── Service Worker + PWA update ───────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      // Check for updates periodically
      setInterval(() => reg.update(), 60 * 1000);

      reg.addEventListener('updatefound', () => {
        const nw = reg.installing;
        if (!nw) return;
        nw.addEventListener('statechange', () => {
          if (nw.state === 'activated' && navigator.serviceWorker.controller) {
            // New version available
            $updateBar.classList.add('visible');
          }
        });
      });
    }).catch(() => {});

    // Also detect controller change (another tab activated new SW)
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      $updateBar.classList.add('visible');
    });
  });
}

// ── iOS keyboard / viewport fix ───────────────────────────────────────────────
(function() {
  const $app = document.getElementById('app');

  function resetViewport() {
    $app.style.height = '100dvh';
    $app.style.top = '0px';
  }

  if (window.visualViewport) {
    const vv = window.visualViewport;

    function onViewportResize() {
      // Only adjust for keyboard when input is actually focused
      const keyboardOpen = vv.height < window.innerHeight - 50
                           && document.activeElement === $inp;
      if (keyboardOpen) {
        $app.style.height = vv.height + 'px';
        $app.style.top = vv.offsetTop + 'px';
        requestAnimationFrame(() => {
          $out.scrollTop = $out.scrollHeight;
        });
      } else {
        resetViewport();
      }
    }

    vv.addEventListener('resize', onViewportResize);
    vv.addEventListener('scroll', () => {
      if (document.activeElement === $inp && vv.height < window.innerHeight - 50) {
        $app.style.top = vv.offsetTop + 'px';
      }
    });
  }

  // Reset layout when input loses focus (keyboard closing)
  $inp.addEventListener('blur', () => {
    setTimeout(() => {
      if (document.activeElement !== $inp) resetViewport();
    }, 200);
  });

  // Reset on window focus — catches return from in-app browser overlay
  window.addEventListener('focus', () => {
    resetViewport();
    setTimeout(resetViewport, 300);
  });

  // Reset layout when returning from background
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      resetViewport();
      setTimeout(resetViewport, 300);
      setTimeout(resetViewport, 1000);
    }
  });

  // Also catch bfcache restoration
  window.addEventListener('pageshow', () => {
    resetViewport();
  });

  // Prevent body scroll on iOS
  document.body.addEventListener('touchmove', e => {
    if (e.target === document.body) e.preventDefault();
  }, { passive: false });

  // When input focused, scroll output to bottom
  $inp.addEventListener('focus', () => {
    setTimeout(() => {
      $out.scrollTop = $out.scrollHeight;
    }, 300);
  });
})();

// ── CRT boot animation ────────────────────────────────────────────────────────
document.getElementById('crt-overlay')?.addEventListener('animationend', e => {
  e.target.remove();
});

main().catch(console.error);
</script>
</body>
</html>
