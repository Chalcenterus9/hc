<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-visual">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="hc">
  <meta name="theme-color" content="#0d0d0d">
  <link rel="manifest" href="./manifest.json">
  <title>hc — hack.chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #212834;
      --fg: #d4d4d4;
      --cy: #4ec9b0;
      --yl: #e5c07b;
      --mg: #c678dd;
      --rd: #e06c75;
      --bl: #61afef;
      --gr: #98c379;
      --dm: #a6a6a6;
      --hdr: #1a1f2b;
      --hy: #3a3000;
      --hyr: #3a0000;
      --hyg: #003a00;
      --hyb: #003040;
      --mn: #3a3000;
    }

    html, body {
      height: 100%; height: 100dvh;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Menlo', 'Monaco', 'Cascadia Code', 'Courier New', Courier, monospace;
      font-size: 10px;
      line-height: 1.6;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
      position: fixed;
      width: 100%;
      top: 0;
      left: 0;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%; height: 100dvh;
      position: fixed;
      width: 100%;
      top: 0;
      left: 0;
    }

    /* ── Header bar ── */
    #hdr {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
      padding-top: env(safe-area-inset-top, 0px);
      height: calc(32px + env(safe-area-inset-top, 0px));
      background: var(--hdr);
      border-bottom: 1px solid rgba(128,128,128,0.2);
      flex-shrink: 0;
      font-size: 11px;
      user-select: none;
      min-height: calc(32px + env(safe-area-inset-top, 0px));
    }
    #hdr.visible { display: flex; }
    #hdr-room { color: var(--cy); font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #hdr-enc { margin-left: auto; font-size: 10px; flex-shrink: 0; }
    #hdr-enc.on  { color: var(--gr); }
    #hdr-enc.off { color: var(--rd); }
    #hdr-users { color: var(--dm); font-size: 10px; flex-shrink: 0; }
    #hdr-reconn { color: var(--yl); font-size: 10px; flex-shrink: 0; display: none; }

    #out {
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: none;
      padding: calc(24px + env(safe-area-inset-top, 0px)) 14px 4px;
      white-space: pre-wrap;
      word-break: break-word;
      -webkit-overflow-scrolling: touch;
    }

    /* ── Update banner ── */
    #update-bar {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: calc(8px + env(safe-area-inset-top, 0px)) 14px 8px;
      background: var(--hyg);
      color: var(--gr);
      font-size: 11px;
      cursor: pointer;
      flex-shrink: 0;
      user-select: none;
    }
    #update-bar.visible { display: flex; }

    .ln { display: block; min-height: 1.6em; }

    #bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      padding-bottom: calc(7px + env(safe-area-inset-bottom, 0px));
      border-top: 1px solid rgba(128,128,128,0.2);
      flex-shrink: 0;
      background: var(--bg);
    }

    #pr { color: var(--cy); user-select: none; flex-shrink: 0; }

    #inp {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--fg);
      font-family: inherit;
      font-size: 16px;
      line-height: inherit;
      caret-color: var(--cy);
      min-width: 0;
    }

    /* color classes */
    .cy { color: var(--cy); }
    .yl { color: var(--yl); }
    .mg { color: var(--mg); }
    .rd { color: var(--rd); }
    .bl { color: var(--bl); }
    .gr { color: var(--gr); }
    .dm { color: var(--dm); }

    /* highlight backgrounds */
    .hy  { background: var(--hy); padding: 0 2px; border-radius: 2px; }
    .hyr { background: var(--hyr); padding: 0 2px; border-radius: 2px; }
    .hyg { background: var(--hyg); padding: 0 2px; border-radius: 2px; }
    .hyb { background: var(--hyb); padding: 0 2px; border-radius: 2px; }

    /* mention highlight */
    .mention { background: var(--mn); padding: 0 2px; border-radius: 2px; color: var(--yl); font-weight: bold; }

    /* markdown */
    .st { text-decoration: line-through; }
    .ul { text-decoration: underline; }

    /* ── New message indicator ── */
    #new-msg {
      display: none;
      justify-content: center;
      padding: 4px 0;
      color: var(--cy);
      font-size: 11px;
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
      opacity: 0.7;
    }
    #new-msg.visible { display: flex; }

    /* ── Unread fade ── */
    .unread-fade {
      animation: unreadPulse 1.5s ease-out forwards;
    }
    @keyframes unreadPulse {
      0%   { background: var(--hy); }
      100% { background: transparent; }
    }

    /* ── CRT glitch ── */
    #crt-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 9999;
      pointer-events: none;
      background: var(--bg);
      animation: crtBoot 0.6s ease-out forwards;
    }
    #crt-overlay::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.03) 0px,
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
      );
      animation: crtScanlines 0.6s ease-out forwards;
    }
    @keyframes crtBoot {
      0%   { opacity: 1; }
      15%  { opacity: 1; transform: scaleY(0.005) scaleX(1.2); }
      20%  { opacity: 1; transform: scaleY(0.005) scaleX(1.2); }
      35%  { opacity: 1; transform: scaleY(1.1) scaleX(0.98); }
      45%  { opacity: 0.8; transform: scaleY(1) scaleX(1); }
      60%  { opacity: 0.4; }
      100% { opacity: 0; }
    }
    @keyframes crtScanlines {
      0%   { opacity: 1; }
      60%  { opacity: 0.6; }
      100% { opacity: 0; }
    }
  </style>
</head>

  r.setProperty('--hyr', t.hyr);
  r.setProperty('--hyg', t.hyg);
  r.setProperty('--hyb', t.hyb);
  r.setProperty('--mn', t.mn);
  // Update meta theme-color for iOS status bar
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.content = t.bg;
  store.set(K_THEME, name);
}

  get(k)    { return ghostMode ? null : localStorage.getItem(k); },
  set(k, v) { if (!ghostMode) localStorage.setItem(k, v); },

};

// ── Output ────────────────────────────────────────────────────────────────────
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// ── Typewriter engine ─────────────────────────────────────────────────────────
const typeQueue = [];
let typing = false;
let typeTimer = null;

function flushType() {
  if (typeTimer) { clearInterval(typeTimer); typeTimer = null; }
  typeQueue.length = 0;
  typing = false;
}

function print(html, typed = false) {
  const atBottom = $out.scrollTop + $out.clientHeight >= $out.scrollHeight - 10;
  const s = document.createElement('span');
  s.className = 'ln';
  s.innerHTML = html;

  if (typed) {
    // Collect text nodes, store full text, empty them
    const nodes = [];
    const walker = document.createTreeWalker(s, NodeFilter.SHOW_TEXT);
    let n;
    while (n = walker.nextNode()) {
      if (n.textContent.length > 0) {
        nodes.push({ node: n, full: n.textContent });
        n.textContent = '';
      }
    }
    // Skip typewriter for whitespace-only content
    const totalText = nodes.map(n => n.full).join('');
    if (!totalText.trim()) {
      nodes.forEach(n => n.node.textContent = n.full);
      $out.appendChild(s);
      if (atBottom) $out.scrollTop = $out.scrollHeight;
      return;
    }

    $out.appendChild(s);
    if (atBottom) $out.scrollTop = $out.scrollHeight;

    if (nodes.length > 0) {
      typeQueue.push({ nodes });
      if (!typing) processTypeQueue();
    }
  } else {
    $out.appendChild(s);
    if (atBottom) $out.scrollTop = $out.scrollHeight;
  }
}

function processTypeQueue() {
  if (typeQueue.length === 0) { typing = false; return; }

  // If queue backs up, flush all but last instantly
  while (typeQueue.length > 3) {
    const item = typeQueue.shift();
    item.nodes.forEach(n => n.node.textContent = n.full);
  }

  typing = true;
  const { nodes } = typeQueue.shift();

  // Build flat char list across all text nodes
  const chars = [];
  for (const { node, full } of nodes) {
    for (const ch of full) chars.push({ node, ch });
  }

  let i = 0;
  // Adaptive: finish in ~50 ticks (≈600ms), min 8ms interval
  const interval = Math.max(8, Math.round(600 / chars.length));
  const perTick = Math.max(1, Math.ceil(chars.length / 50));

  const timer = setInterval(() => {
    if (i >= chars.length) {
      clearInterval(timer);
      typeTimer = null;
      processTypeQueue();
      return;
    }
    // Speed up if queue is building
    const batch = typeQueue.length > 0 ? perTick * 3 : perTick;
    for (let b = 0; b < batch && i < chars.length; b++, i++) {
      chars[i].node.textContent += chars[i].ch;
    }
    const atBot = $out.scrollTop + $out.clientHeight >= $out.scrollHeight - 10;
    if (atBot) $out.scrollTop = $out.scrollHeight;
  }, interval);
  typeTimer = timer;
}

const ln = (h = '', typed = true) => print(h + '\n', typed);

function ts() {
  const n = new Date();
  const h = String(n.getHours()).padStart(2,'0');
  const m = String(n.getMinutes()).padStart(2,'0');
  return `<span class="dm">[${h}:${m}]</span>`;

// ── Scroll & unread indicator ─────────────────────────────────────────────────
let unreadCount = 0;

function isAtBottom() {
  return $out.scrollTop + $out.clientHeight >= $out.scrollHeight - 20;
}

function scrollToBottom() {
  $out.scrollTop = $out.scrollHeight;
  clearUnread();
}

function clearUnread() {
  unreadCount = 0;
  $newMsg.classList.remove('visible');
  // Trigger fade on all unread elements
  const unreads = $out.querySelectorAll('.unread');
  unreads.forEach(el => {
    el.classList.remove('unread');
    el.classList.add('unread-fade');
  });
}

function showNewMsgIndicator() {
  unreadCount++;
  $newMsg.textContent = `↓ ${unreadCount} new`;
  $newMsg.classList.add('visible');
}

// Detect when user scrolls to bottom
let scrollDebounce = null;
$out.addEventListener('scroll', () => {
  if (scrollDebounce) clearTimeout(scrollDebounce);
  scrollDebounce = setTimeout(() => {
    if (isAtBottom() && unreadCount > 0) clearUnread();
  }, 100);
});

// ── Input ─────────────────────────────────────────────────────────────────────
const waitInput = () => new Promise(r => { resolveInput = r; });

$inp.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const v = $inp.value;
  $inp.value = '';

  // resolveInput takes priority (vault password, nuke confirm, setup prompts)
  if (resolveInput) {
    const fn = resolveInput;
    resolveInput = null;
    fn(v);
  } else if (mode === 'chat') {
    handleChat(v).catch(console.error);
  }
});

// Tap anywhere on output to focus input (mobile)
$out.addEventListener('click', () => $inp.focus());

// Auto-focus on load
window.addEventListener('load', () => $inp.focus());

// Unlock AudioContext on first user interaction (required by iOS)
document.addEventListener('touchstart', function unlock() {
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  document.removeEventListener('touchstart', unlock);
}, { once: true });

// ── Crypto (Web Crypto API) ───────────────────────────────────────────────────
const TE = new TextEncoder();
const TD = new TextDecoder();

async function sha256raw(data) {
  return new Uint8Array(await crypto.subtle.digest('SHA-256', data));
}

async function sha256hex(s) {
  const buf = await sha256raw(TE.encode(s));
  return [...buf].map(b => b.toString(16).padStart(2,'0')).join('');
}

async function deriveBaseKey(phrase) {
  const km = await crypto.subtle.importKey('raw', TE.encode(phrase), 'HKDF', false, ['deriveBits']);
  const bits = await crypto.subtle.deriveBits(
    { name:'HKDF', hash:'SHA-256', salt:TE.encode('hcpy-room-v1'), info:TE.encode('crypto') },
    km, 256
  );
  return new Uint8Array(bits);
}

async function deriveRoomName(phrase) {
  const km = await crypto.subtle.importKey('raw', TE.encode(phrase), 'PBKDF2', false, ['deriveBits']);
  const bits = await crypto.subtle.deriveBits(
    { name:'PBKDF2', hash:'SHA-256', salt:TE.encode('hcpy-room-v2'), iterations: 500000 },
    km, 256
  );
  return [...new Uint8Array(bits)].map(b => b.toString(16).padStart(2,'0')).join('');
}

function periodStr(offsetH = 0) {
  const d = new Date(Date.now() + offsetH * 3600000);
  return [
    d.getUTCFullYear(),
    String(d.getUTCMonth()+1).padStart(2,'0'),
    String(d.getUTCDate()).padStart(2,'0'),
    String(d.getUTCHours()).padStart(2,'0')
  ].join('-');
}

async function periodAESKey(bk, pid, usage) {
  const hk  = await crypto.subtle.importKey('raw', bk, {name:'HMAC', hash:'SHA-256'}, false, ['sign']);
  const sig  = await crypto.subtle.sign('HMAC', hk, TE.encode(pid));
  return crypto.subtle.importKey('raw', sig, {name:'AES-GCM'}, false, [usage]);
}

async function encMsg(plain) {
  const pid = periodStr(0);
  const key = await periodAESKey(baseKey, pid, 'encrypt');
  const iv  = crypto.getRandomValues(new Uint8Array(12));
  const ct  = new Uint8Array(await crypto.subtle.encrypt({name:'AES-GCM', iv}, key, TE.encode(plain)));
  const raw = new Uint8Array(12 + ct.byteLength);
  raw.set(iv); raw.set(ct, 12);
  let bin = '';
  for (let i = 0; i < raw.length; i++) bin += String.fromCharCode(raw[i]);
  return `enc:${pid}:${btoa(bin)}`;
}

async function decMsg(text) {
  if (!text.startsWith('enc:') || !baseKey) return null;
  try {
    const [, pid, b64] = text.split(':', 3);
    const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const iv  = raw.slice(0, 12);
    const ct  = raw.slice(12);
    for (const off of [0, -1, 1]) {
      try {
        const key = await periodAESKey(baseKey, periodStr(off), 'decrypt');
        const pt  = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ct);
        return TD.decode(pt);
      } catch {}
    }
  } catch {}
  return null;
}

// ── Fingerprint (emoji) ───────────────────────────────────────────────────────
async function getFingerprint(bk) {
  const hash = await sha256raw(bk);
  return [hash[0], hash[1], hash[2], hash[3]]
    .map(b => FP_EMOJI[b % FP_EMOJI.length])
    .join(' ');
}

// ── Vault (encrypted room storage) ────────────────────────────────────────────
async function vaultKey(password, salt) {
  const km = await crypto.subtle.importKey('raw', TE.encode(password), 'PBKDF2', false, ['deriveBits']);
  const bits = await crypto.subtle.deriveBits(
    { name:'PBKDF2', hash:'SHA-256', salt, iterations: 100000 },
    km, 256
  );
  return crypto.subtle.importKey('raw', bits, {name:'AES-GCM'}, false, ['encrypt','decrypt']);
}

async function vaultEncrypt(data, password) {
  let salt = null;
  const savedSalt = store.get(K_VSALT);
  if (savedSalt) {
    salt = Uint8Array.from(atob(savedSalt), c => c.charCodeAt(0));
  } else {
    salt = crypto.getRandomValues(new Uint8Array(16));
    let bin = '';
    for (let i = 0; i < salt.length; i++) bin += String.fromCharCode(salt[i]);
    store.set(K_VSALT, btoa(bin));
  }
  const key = await vaultKey(password, salt);
  const iv  = crypto.getRandomValues(new Uint8Array(12));
  const ct  = new Uint8Array(await crypto.subtle.encrypt(
    {name:'AES-GCM', iv}, key, TE.encode(JSON.stringify(data))
  ));
  const raw = new Uint8Array(12 + ct.byteLength);
  raw.set(iv); raw.set(ct, 12);
  let bin = '';
  for (let i = 0; i < raw.length; i++) bin += String.fromCharCode(raw[i]);
  return btoa(bin);
}

async function vaultDecrypt(b64, password) {
  const savedSalt = store.get(K_VSALT);
  if (!savedSalt) return null;
  const salt = Uint8Array.from(atob(savedSalt), c => c.charCodeAt(0));
  const key  = await vaultKey(password, salt);
  const raw  = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const iv   = raw.slice(0, 12);
  const ct   = raw.slice(12);
  try {
    const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ct);
    return JSON.parse(TD.decode(pt));
  } catch {
    return null;
  }
}

      ? `<span class="gr">[enc]</span> ${esc(r.phrase.length > 20 ? r.phrase.slice(0,20)+'…' : r.phrase)}`

    ln(`    <span class="cy">${i + 1}.</span> ${label}${srv}  <span class="dm">as</span> ${esc(r.nick.split('#')[0])}`);
  });
  ln();
  ln(`  <span class="cy">[number]</span> connect  <span class="cy">[Enter]</span> cancel  <span class="cy">[/del N]</span> remove`);
  while (true) {
    const cmd = (await waitInput()).trim();
    if (!cmd) return null;
    const delMatch = cmd.match(/^\/del\s+(\d+)$/i);
    if (delMatch) {
      const idx = parseInt(delMatch[1]) - 1;
      if (idx >= 0 && idx < rooms.length) {
        const removed = rooms.splice(idx, 1)[0];
        const label = removed.phrase || ('?' + removed.room);
        const enc = await vaultEncrypt(rooms, password);
        store.set(K_VAULT, enc);
        ln(`  <span class="dm">Removed: ${esc(label.slice(0,24))}</span>`);
        if (rooms.length === 0) {
          ln(`  <span class="dm">Vault is now empty.</span>`);
          return null;
        }
        rooms.forEach((r, i) => {
          const l = r.phrase
            ? `<span class="gr">[enc]</span> ${esc(r.phrase.length > 20 ? r.phrase.slice(0,20)+'…' : r.phrase)}`
            : `<span class="dm">[pub]</span> ?${esc(r.room)}`;
          ln(`    <span class="cy">${i + 1}.</span> ${l}`);
        });
        continue;
      }
      ln(`  <span class="rd">! Invalid number.</span>`);
      continue;
    }
    const n = parseInt(cmd);
    if (n >= 1 && n <= rooms.length) {
      return { entry: rooms[n - 1], password };
    }
    ln(`  <span class="rd">! Enter a number 1-${rooms.length}, /del N, or Enter to cancel.</span>`);
  }
}

async function saveToVault() {
  if (ghostMode) {
    ln(`  <span class="yl">Ghost mode — vault disabled.</span>`);
    return;
  }
  const existing = store.get(K_VAULT);
  let password, rooms;
  if (existing) {
    ln(`  <span class="cy">Vault password:</span>`);
    password = (await waitInput()).trim();
    if (!password) { ln(`  <span class="dm">Cancelled.</span>`); return; }
    rooms = await vaultDecrypt(existing, password);
    if (!rooms) { ln(`  <span class="rd">! Wrong password.</span>`); return; }
  } else {
    ln(`  <span class="cy">Set vault master password</span> (first time):`);
    password = (await waitInput()).trim();
    if (!password) { ln(`  <span class="dm">Cancelled.</span>`); return; }
    ln(`  <span class="cy">Confirm password:</span>`);
    const confirm = (await waitInput()).trim();
    if (confirm !== password) { ln(`  <span class="rd">! Passwords don't match.</span>`); return; }
    rooms = [];
  }
  const isDup = rooms.some(r => r.room === curRoom && r.server === curServer);
  if (isDup) {
    ln(`  <span class="yl">This room is already in vault.</span>`);
    return;
  }
  rooms.push({ room: curRoom, phrase: curPhrase || '', server: curServer, nick: curFullNick });
  const enc = await vaultEncrypt(rooms, password);
  store.set(K_VAULT, enc);
  const label = curPhrase || ('?' + curRoom);
  ln(`  <span class="gr">✓ Saved to vault:</span> ${esc(label.length > 24 ? label.slice(0,24)+'…' : label)}`);
}

// ── Markdown ──────────────────────────────────────────────────────────────────
function md(s) {
  s = esc(s);
  // @mentions — highlight if it's our nick
  s = s.replace(/@(\w+)/g, (m, nick) => {
    if (nick.toLowerCase() === curNick.toLowerCase()) {
      return `<span class="mention">@${nick}</span>`;
    }
    return `<span class="cy">@${nick}</span>`;
  });
  s = s.replace(/`(.+?)`/g,             '<span class="dm cy">$1</span>');
  s = s.replace(/\*\*\*(.+?)\*\*\*/g,   '<strong><em>$1</em></strong>');
  s = s.replace(/\*\*(.+?)\*\*/g,       '<strong>$1</strong>');
  s = s.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
  s = s.replace(/~~(.+?)~~/g,           '<span class="st">$1</span>');
  s = s.replace(/__(.+?)__/g,           '<span class="ul">$1</span>');
  s = s.replace(/==(.+?)==/g, (_, t) => {
    if (t.length > 2 && t[1] === ':') {
      const cls = {r:'hyr', g:'hyg', b:'hyb'}[t[0]] ?? 'hy';
      return `<span class="${cls}">${esc(t.slice(2))}</span>`;
    }
    return `<span class="hy">${t}</span>`;
  });
  return s;
}

function nickCls(n) {
  return NC[[...n].reduce((a,c) => a + c.charCodeAt(0), 0) % NC.length];
}

let notifOK = false;
async function askNotif() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'granted') { notifOK = true; return; }
  if (Notification.permission === 'default') {
    notifOK = (await Notification.requestPermission()) === 'granted';
  }
}

// ── Sound ─────────────────────────────────────────────────────────────────────
let audioCtx = null;
function beep(freq = 660, duration = 0.08) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + duration);
  } catch {}
}

function notify(who, room, isMention) {
  if (document.hasFocus() && !isMention) return;
  // Beep: short for regular, double for mention
  if (isMention) {
    beep(880, 0.08);
    setTimeout(() => beep(1100, 0.1), 120);
  } else {
    beep(660, 0.08);
  }
  if (notifOK) {
    const body = isMention
      ? `${who} mentioned you in ?${room.slice(0,12)}`
      : `${who} in ?${room.slice(0,12)}`;
    new Notification('hc', { body, silent: false });
  }
}

// ── Validation helpers ────────────────────────────────────────────────────────
function isValidWsUrl(s) {
  try {
    const u = new URL(s);
    return u.protocol === 'wss:' || u.protocol === 'ws:';
  } catch { return false; }
}

function isValidNick(s) {
  const name = s.split('#')[0];
  return name.length >= 1 && name.length <= 24 && /^[a-zA-Z0-9_]+$/.test(name);
}

function isValidRoom(s) {
  return s.length >= 1 && s.length <= 120;
}

const HOME = Symbol('home');
function goHome() { location.reload(); return HOME; }
async function setupServer() {
  const saved = store.get(K_SRV);
  if (saved) {
    ln(`  Saved server: <span class="cy">${esc(saved)}</span>`);
    ln(`  <span class="cy">[Enter]</span> use  <span class="cy">[/r]</span> reset  <span class="cy">[url /s]</span> save new  <span class="dm">[/] home</span>`);
    const v = (await waitInput()).trim();
    if (v === '/') return goHome();
    if (v === '/r') {
      store.del(K_SRV);
      ln(`  <span class="dm">Reset to hack.chat.</span>`);
      return DEF_SRV;
    }
    if (v.endsWith(' /s')) {
      const s = v.slice(0,-3).trim();
      if (!isValidWsUrl(s)) {
        ln(`  <span class="rd">! Invalid URL. Must start with wss:// or ws://</span>`);
        return await setupServer();
      }
      store.set(K_SRV, s);
      return s;
    }
    if (v && !isValidWsUrl(v)) {
      ln(`  <span class="rd">! Invalid URL. Must start with wss:// or ws://</span>`);
      return await setupServer();
    }
    return v || saved;
  } else {
    ln(`  Custom server?`);
    ln(`  <span class="cy">[Enter]</span> hack.chat  <span class="cy">[url /s]</span> save new  <span class="dm">[/] home</span>`);
    const v = (await waitInput()).trim();
    if (v === '/') return goHome();
    if (v.endsWith(' /s')) {
      const s = v.slice(0,-3).trim();
      if (!isValidWsUrl(s)) {
        ln(`  <span class="rd">! Invalid URL. Must start with wss:// or ws://</span>`);
        return await setupServer();
      }
      store.set(K_SRV, s);
      return s;
    }
    if (v && !isValidWsUrl(v)) {
      ln(`  <span class="rd">! Invalid URL. Must start with wss:// or ws://</span>`);
      return await setupServer();
    }
    return v || DEF_SRV;
  }
}

  const saved = store.get(K_NICK);
  if (saved) {
    ln(`  Saved nick: <span class="cy">${esc(saved.split('#')[0])}</span>`);
    ln(`  <span class="cy">[Enter]</span> use  <span class="cy">[/r]</span> forget  <span class="cy">[name /s]</span> save new  <span class="dm">[/] home</span>`);
    const v = (await waitInput()).trim();
    if (v === '/') return goHome();
    if (v === '/r') {
      store.del(K_NICK);
      ln(`  <span class="dm">Forgot saved nick.</span>`);
      return await askNick();
    }
    if (v.endsWith(' /s')) {
      const nick = v.slice(0,-3).trim();
      if (!isValidNick(nick)) {
        ln(`  <span class="rd">! Nick: 1-24 chars, a-z 0-9 _ only (before #).</span>`);
        return await setupNick();
      }
      store.set(K_NICK, nick);
      return nick;
    }
    if (v) {
      if (!isValidNick(v)) {
        ln(`  <span class="rd">! Nick: 1-24 chars, a-z 0-9 _ only (before #).</span>`);
        return await setupNick();
      }
      return v;
    }
    return saved;
  } else {
    return await askNick();
  }
}

async function askNick() {
  ln();
  ln(`  Nickname (or nick#password)  <span class="cy">[/s]</span> to save  <span class="dm">[/] home</span>`);
  const v = (await waitInput()).trim();
  if (v === '/') return goHome();
  if (v.endsWith(' /s')) {
    const nick = v.slice(0,-3).trim();
    if (!isValidNick(nick)) {
      ln(`  <span class="rd">! Nick: 1-24 chars, a-z 0-9 _ only (before #).</span>`);
      return await askNick();
    }
    store.set(K_NICK, nick);
    return nick;
  }
  if (!v || !isValidNick(v)) {
    ln(`  <span class="rd">! Nick: 1-24 chars, a-z 0-9 _ only (before #).</span>`);
    return await askNick();
  }
  return v;
}

// ── Nuke ──────────────────────────────────────────────────────────────────────
async function nuke() {
  ln();
  ln(`  <span class="rd"><strong>/nuke</strong></span> — delete all saved data and reload.`);
  ln(`  <span class="rd">Type YES to confirm:</span>`);
  const v = (await waitInput()).trim();
  if (v === 'YES') {
    localStorage.removeItem(K_SRV);
    localStorage.removeItem(K_NICK);
    localStorage.removeItem(K_VAULT);
    localStorage.removeItem(K_VSALT);
    localStorage.removeItem(K_THEME);
    flushType();
    $out.innerHTML = '';
    ln(`  <span class="dm">All data wiped. Reloading...</span>`);
    setTimeout(() => location.reload(), 800);
    return true;
  }
  ln(`  <span class="dm">Cancelled.</span>`);
  return false;
}

// ── Check if a command is native (bypass encryption) ──────────────────────────
function isNativeCmd(text) {
  const cmd = text.split(/\s/)[0].toLowerCase();
  return NATIVE_CMDS.has(cmd);
}

// ── Chat command handler ───────────────────────────────────────────────────────
async function handleChat(text) {
  const s = text.trim();
  if (!s) return;

  if (s === '/exit' || s === '/quit' || s === '/restart') {
    cancelReconnect();
    ws?.close(); ws = null;
    hideHeader();
    ln(`  <span class="dm">Reloading...</span>`);
    setTimeout(() => location.reload(), 400);
    return;
  }
  if (s === '/nuke') {
    mode = 'setup';
    hideHeader();
    const ok = await nuke();
    if (!ok) { mode = 'chat'; showHeader(); }
    return;
  }
  if (s === '/clear')  { flushType(); $out.innerHTML = ''; return; }
  if (s === '/room')   { ln(`  Room: <span class="cy">?${esc(curRoom)}</span>`); return; }
  if (s === '/who')    { ln(`  Online (${users.size}): <span class="cy">${[...users].sort().map(esc).join(', ')}</span>`); return; }
  if (s === '/format') { fmtHelp(); return; }
  if (s === '/readme') { readme(); return; }
  if (s === '/help')   { showHelp(); return; }
  if (s === '/fp')     { showFingerprint(); return; }

  if (s === '/theme') {
    await showThemePicker();
    return;
  }

  if (s === '/save') {
    await saveToVault();
    return;
  }

  if (s === '/enc') {
    if (!baseKey) {
      ln(`  <span class="yl">No phrase set — reconnect with a secret phrase to use encryption.</span>`);
    } else {
      encOn = !encOn;
      ln(`  Encryption: ${encOn ? '<span class="gr">ON</span>' : '<span class="yl">OFF</span>'}`);
      updateEncIcon();
    }
    return;
  }

  // /dm @nick msg → /whisper nick msg (client alias)
  const dmMatch = s.match(/^\/dm\s+@?(\S+)\s+([\s\S]+)$/i);
  if (dmMatch) {
    const payload = `/whisper ${dmMatch[1]} ${dmMatch[2]}`;
    ws?.send(JSON.stringify({ cmd:'chat', text: payload }));
    ln(`${ts()} <span class="mg">→ whisper to ${esc(dmMatch[1])}</span>: ${md(dmMatch[2])}`);
    scrollToBottom();
    return;
  }

  // Native server commands — always plaintext
  if (s.startsWith('/') && isNativeCmd(s)) {
    ws?.send(JSON.stringify({ cmd:'chat', text: s }));
    return;
  }

  // Regular message — encrypt if enabled
  let payload = text;
  if (encOn && baseKey) payload = await encMsg(text);
  ws?.send(JSON.stringify({ cmd:'chat', text: payload }));
  scrollToBottom();
}

// ── Reconnect logic ───────────────────────────────────────────────────────────
function cancelReconnect() {
  if (reconnTimer) { clearTimeout(reconnTimer); reconnTimer = null; }
  reconnecting = false;
  reconnCount = 0;
  $hdrReconn.style.display = 'none';
}

function scheduleReconnect() {
  if (mode !== 'chat' || reconnecting) return;
  reconnecting = true;
  reconnCount++;
  // Exponential backoff: 1s, 2s, 4s, 8s, max 15s
  const delay = Math.min(1000 * Math.pow(2, reconnCount - 1), 15000);
  $hdrReconn.style.display = '';
  ln(`${ts()} <span class="yl">⟳ Reconnecting in ${(delay/1000).toFixed(0)}s...</span>`);

  reconnTimer = setTimeout(() => {
    reconnTimer = null;
    doReconnect();
  }, delay);
}

function doReconnect() {
  if (mode !== 'chat') { cancelReconnect(); return; }

  ws?.close();
  ws = new WebSocket(curServer);

  ws.onopen = () => {
    ws.send(JSON.stringify({ cmd:'join', channel: curRoom, nick: curFullNick }));
    reconnecting = false;
    reconnCount = 0;
    $hdrReconn.style.display = 'none';
    ln(`${ts()} <span class="gr">✓ Reconnected</span>`);
  };

  ws.onerror = () => {
    ln(`${ts()} <span class="rd">! Reconnect error</span>`);
  };

  ws.onclose = () => {
    if (mode === 'chat') scheduleReconnect();
  };

  ws.onmessage = handleWsMessage;
}

// ── WebSocket message handler (shared between connect and reconnect) ──────────
async function handleWsMessage({ data }) {
  const d   = JSON.parse(data);
  const cmd = d.cmd;
  const wasAtBottom = isAtBottom();

  if (cmd === 'chat') {
    const who = d.nick || '';
    let rawText = d.text || '';
    let text = rawText;
    let isMention = false;

    if (text.startsWith('enc:')) {
      if (baseKey && encOn) {
        const pt = await decMsg(text);
        if (pt !== null) {
          text = md(pt);
          isMention = pt.toLowerCase().includes('@' + curNick.toLowerCase());
        } else {
          text = `<span class="dm">[encrypted — wrong key or period]</span>`;
        }
      } else {
        text = `<span class="dm">[encrypted]</span>`;
      }
    } else {
      isMention = rawText.toLowerCase().includes('@' + curNick.toLowerCase());
      text = md(text);
    }

    const trip = d.trip ? ` <span class="dm">(${esc(d.trip)})</span>` : '';
    const isOwn = who === curNick;
    ln(`${ts()} <span class="${nickCls(who)}"><strong>${esc(who)}</strong></span>${trip}: ${text}`, !isOwn);

    if (isOwn) {
      // Always scroll to own message
      scrollToBottom();
    } else {
      notify(who, curRoom, isMention);
      if (!wasAtBottom) {
        // Mark as unread
        const last = $out.lastElementChild;
        if (last) last.classList.add('unread');
        showNewMsgIndicator();
      }
    }
  }
  else if (cmd === 'onlineSet') {
    users = new Set(d.nicks || []);
    ln(`${ts()} <span class="dm">Online: ${(d.nicks||[]).map(esc).join(', ')}</span>`, true);
    updateUsersCount();
  }
  else if (cmd === 'onlineAdd') {
    users.add(d.nick);
    ln(`${ts()} <span class="yl">+ ${esc(d.nick)} joined</span>`, true);
    updateUsersCount();
    if (!wasAtBottom) {
      const last = $out.lastElementChild;
      if (last) last.classList.add('unread');
      showNewMsgIndicator();
    }
  }
  else if (cmd === 'onlineRemove') {
    users.delete(d.nick);
    ln(`${ts()} <span class="dm">- ${esc(d.nick)} left</span>`, true);
    updateUsersCount();
  }
  else if (cmd === 'info') { ln(`${ts()} <span class="dm">i: ${esc(d.text||'')}</span>`, true); }
  else if (cmd === 'warn') { ln(`${ts()} <span class="rd">! ${esc(d.text||'')}</span>`, true); }
}

// ── Connect ───────────────────────────────────────────────────────────────────
function connectChat(server, room, nick) {
  curRoom     = room;
  curNick     = nick.split('#')[0];
  curServer   = server;
  curFullNick = nick;
  users       = new Set();

  const short = room.length > 16 ? room.slice(0,16) + '…' : room;

  // Set page title to room name
  document.title = `hc — ?${short}`;

  return new Promise(resolve => {
    resolveChat = resolve;

    ln();
    ln(`  <span class="dm">Connecting...</span>`);
    ws = new WebSocket(server);

    ws.onopen = () => {
      ws.send(JSON.stringify({ cmd:'join', channel:room, nick }));
      const enc = encOn && baseKey
        ? `<span class="gr">[ENC ON]</span>`
        : `<span class="dm">[no enc]</span>`;
      ln(`  <span class="dm">Connected to</span> <span class="cy">?${esc(short)}</span>  ${enc}`);
      if (ghostMode) ln(`  <span class="dm">👻 ghost mode — nothing saved</span>`);
      // Show fingerprint on connect if encrypted
      if (encOn && baseKey) {
        getFingerprint(baseKey).then(fp => {
          ln(`  <span class="dm">Key fingerprint:</span>  ${fp}`);
        });
      }
      ln(`  <span class="dm">/help for commands</span>`);
      ln();
      mode = 'chat';
      showHeader();
      // Force scroll to bottom so user sees the chat
      requestAnimationFrame(() => { $out.scrollTop = $out.scrollHeight; });
      $inp.focus();
      askNotif();
    };

    ws.onerror = () => {
      ln(`${ts()} <span class="rd">! Connection error</span>`);
    };

    ws.onclose = () => {
      if (mode === 'chat' && resolveChat) {
        // Don't resolve — try to reconnect
        scheduleReconnect();
      } else if (resolveChat) {
        resolveChat('disconnected');
        resolveChat = null;
      }
    };

    ws.onmessage = handleWsMessage;
  });
}

// ── Visibility change: reconnect when returning from background ───────────────
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && mode === 'chat') {
    // Check if WebSocket is dead
    if (!ws || ws.readyState === WebSocket.CLOSED || ws.readyState === WebSocket.CLOSING) {
      cancelReconnect();
      reconnCount = 0;
      scheduleReconnect();
    }
  }
});

// ── Main loop ─────────────────────────────────────────────────────────────────
async function main() {
  loadSavedTheme();
  let first = true;

  while (true) {
    flushType();
    $out.innerHTML = '';
    mode = 'setup';
    hideHeader();
    curPhrase = '';
    ghostMode = false;

    document.title = 'hc — hack.chat';

    if (first) {
      banner();
      const vaultHint = hasVault() ? `  <span class="cy">[/vault]</span> saved rooms` : '';
      ln(`  <span class="cy">[Enter]</span> start  <span class="cy">[/readme]</span> guide  <span class="cy">[/ghost]</span> stealth`);
      ln(`  <span class="cy">[/options]</span> settings${vaultHint}`);
      const c = (await waitInput()).trim();

      if (c === '/readme') {
        readme();
        await waitInput();
        flushType();
        $out.innerHTML = '';
        first = false;
        continue;
      }

      if (c === '/options') {
        await showThemePicker();
        flushType();
        $out.innerHTML = '';
        first = false;
        continue;
      }

      if (c === '/ghost') {
        ghostMode = true;
        ln(`  <span class="dm">👻 Ghost mode — nothing will be saved to device.</span>`);
      }

      if (c === '/vault') {
        const result = await showVaultAndPick();
        if (result) {
          first = false;
          const { entry } = result;
          if (entry.phrase) {
            curPhrase = entry.phrase;
            ln(`  <span class="dm">Deriving room key...</span>`);
            const h = await deriveRoomName(entry.phrase);
            baseKey = await deriveBaseKey(entry.phrase);
            encOn = true;
            await connectChat(entry.server, h, entry.nick);
          } else {
            baseKey = null; encOn = false;
            await connectChat(entry.server, entry.room, entry.nick);
          }
          cancelReconnect();
          hideHeader();
          ln();
          ln(`  <span class="dm">Back to start...</span>`);
          await new Promise(r => setTimeout(r, 600));
          continue;
        }
        // Cancelled — back to start
        location.reload();
        return;
      }

      first = false;
    }

    ln(`  <span class="cy"><strong>hc</strong></span><span class="dm">.py v${VER}</span>`);
    if (ghostMode) ln(`  <span class="dm">👻 ghost</span>`);
    ln();

    const server = await setupServer();
    if (server === HOME) return;
    const room   = await setupRoom();
    if (room === HOME) return;
    const nick   = await setupNick();
    if (nick === HOME) return;

    if (!nick) {
      ln(`  <span class="rd">! Nickname is required.</span>`);
      await new Promise(r => setTimeout(r, 1000));
      continue;
    }

    const reason = await connectChat(server, room, nick);

    // quit or disconnected → loop back to setup
    cancelReconnect();
    hideHeader();
    ln();
    ln(`  <span class="dm">Back to start...</span>`);
    await new Promise(r => setTimeout(r, 600));
  }
}

// ── Service Worker + PWA update ───────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      // Check for updates periodically
      setInterval(() => reg.update(), 60 * 1000);

      reg.addEventListener('updatefound', () => {
        const nw = reg.installing;
        if (!nw) return;
        nw.addEventListener('statechange', () => {
          if (nw.state === 'activated' && navigator.serviceWorker.controller) {
            // New version available
            $updateBar.classList.add('visible');
          }
        });
      });
    }).catch(() => {});

    // Also detect controller change (another tab activated new SW)
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      $updateBar.classList.add('visible');
    });
  });
}

// ── iOS keyboard / viewport fix ───────────────────────────────────────────────
(function() {
  const $app = document.getElementById('app');

  if (window.visualViewport) {
    const vv = window.visualViewport;

    function onViewportResize() {
      // Set app height to visual viewport (excludes keyboard)
      $app.style.height = vv.height + 'px';
      // Compensate for any offset (iOS scrolls the page up)
      $app.style.top = vv.offsetTop + 'px';
      // Force scroll to bottom of output when keyboard appears
      requestAnimationFrame(() => {
        $out.scrollTop = $out.scrollHeight;
      });
    }

    vv.addEventListener('resize', onViewportResize);
    vv.addEventListener('scroll', () => {
      // Prevent iOS from scrolling the fixed layout
      $app.style.top = vv.offsetTop + 'px';
    });
  }

  // Prevent body scroll on iOS
  document.body.addEventListener('touchmove', e => {
    if (e.target === document.body) e.preventDefault();
  }, { passive: false });

  // When input focused, scroll output to bottom
  $inp.addEventListener('focus', () => {
    setTimeout(() => {
      $out.scrollTop = $out.scrollHeight;
    }, 300);
  });
})();

// ── CRT boot animation ────────────────────────────────────────────────────────
document.getElementById('crt-overlay')?.addEventListener('animationend', e => {
  e.target.remove();
});

main().catch(console.error);
</script>
